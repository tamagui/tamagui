appId: com.tamagui.tamaguikitchensink
---
# Test that Toast v2 composable API renders toasts correctly on native
- launchApp
# tap the Toast Multiple Case link on the home screen
- tapOn:
    text: 'Toast Multiple Case'
# tap the default toast button
- tapOn:
    id: 'toast-default'
- assertVisible:
    id: 'toast-item-0'
# tap success toast
- tapOn:
    id: 'toast-success'
- assertVisible:
    id: 'toast-item-1'
# dismiss all
- tapOn:
    id: 'toast-dismiss-all'
