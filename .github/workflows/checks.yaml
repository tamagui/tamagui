name: Checks

on:
  pull_request:
  push:
    paths-ignore:
      - 'assets/**'
      - '.vscode/**'
    branches:
      - main
      - v2
      - 'v2-*'
      - v3
      - 'v3-*'

permissions:
  contents: read

# cancel in-progress runs on the same branch (avoids duplicate PR + push runs)
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install
        uses: ./.github/actions/install

      # replaces dependabot. all critical advisories are pinned to patched
      # versions via root package.json "overrides", so this gates cleanly with
      # no ignore list. remaining high/moderate advisories require cross-major
      # bumps of example/tooling deps (vite, undici, tar, react-router, etc.) -
      # run `bun audit` locally to review them.
      - name: Security audit
        run: bun audit --audit-level critical

      - name: Check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  unit-tests:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=6144'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install
        uses: ./.github/actions/install

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install playwright
        run: bunx playwright install

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Run unit tests
        run: bun turbo run test:web --filter='!@tamagui/kitchen-sink' --concurrency=1

  changes:
    runs-on: ubuntu-latest
    outputs:
      integration-relevant: ${{ steps.turbo-check.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: 'package.json'

      # turbo reads workspace graph from package.json files — no bun install needed
      # TODO: turbo ls --affected is broken in <=2.8.20 (ignores git refs, false positives
      # on root config changes — vercel/turborepo#11144, #10869). fix landed in 2.8.21
      # canaries (PR #12424). once stable, simplify this to: turbo ls --affected
      - name: Install turbo
        run: npm install -g turbo@2

      - name: Check if kitchen-sink dependency tree changed
        id: turbo-check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            BASE_REF="${{ github.base_ref }}"
            HEAD_REF="${{ github.head_ref }}"

            if [ "$BASE_REF" = "v3-beta" ] || [[ "$BASE_REF" == v3-* ]] || [[ "$HEAD_REF" == v3-* ]]; then
              echo "relevant=true" >> $GITHUB_OUTPUT
              echo "::notice::Kitchen-sink integration forced for v3 PR ($HEAD_REF -> $BASE_REF)"
              exit 0
            fi
          else
            BASE="HEAD~1"
          fi

          # get all package directories in kitchen-sink's transitive dependency tree
          # turbo ls resolves the real workspace dependency graph — no manual list needed
          DEP_DIRS=$(turbo ls --filter='@tamagui/kitchen-sink...' 2>/dev/null | awk 'NR>1 && NF>0 {print $2}' | grep '/')

          if [ -z "$DEP_DIRS" ]; then
            echo "relevant=true" >> $GITHUB_OUTPUT
            echo "::warning::Could not resolve dependency tree, running tests as fallback"
            exit 0
          fi

          # build a single regex from all dependency directories + root config files
          PATTERN=$(echo "$DEP_DIRS" | paste -sd'|' -)
          FULL_PATTERN="^($PATTERN)/|^(package\.json|bun\.lock|turbo\.json)$"

          CHANGED=$(git diff --name-only "$BASE" HEAD)

          if echo "$CHANGED" | grep -qE "$FULL_PATTERN"; then
            MATCHED=$(echo "$CHANGED" | grep -E "$FULL_PATTERN" | head -5)
            echo "relevant=true" >> $GITHUB_OUTPUT
            echo "::notice::Integration tests needed. Changed dependency files: $(echo "$MATCHED" | tr '\n' ', ')"
          else
            echo "relevant=false" >> $GITHUB_OUTPUT
            echo "::notice::Integration tests skipped — no changes in kitchen-sink dependency tree"
          fi

  integration-tests:
    needs: changes
    if: needs.changes.outputs.integration-relevant == 'true'
    # gate is turbo's actual workspace dependency graph — no manual path list to maintain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    env:
      NODE_OPTIONS: '--max-old-space-size=6144'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && (github.base_ref == 'v3-beta' || startsWith(github.base_ref, 'v3-') || startsWith(github.head_ref, 'v3-')) && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Install
        uses: ./.github/actions/install

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install playwright
        run: bunx playwright install --with-deps

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Run kitchen-sink web + render-count tests (shard ${{ matrix.shard }})
        run: cd code/kitchen-sink && NODE_ENV=test npx playwright test --shard=${{ matrix.shard }} --update-snapshots=missing # bootstrap: remove after the Linux StyleValidation snapshots from this job's artifact are committed
        timeout-minutes: 20

  v3-ssr-hydration:
    if: github.event_name == 'pull_request' && (github.base_ref == 'v3-beta' || startsWith(github.base_ref, 'v3-') || startsWith(github.head_ref, 'v3-'))
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=6144'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Install
        uses: ./.github/actions/install

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run SSR hydration checks
        run: |
          cd code/sandbox
          TEST_MODE=prod NODE_ENV=test bunx playwright test \
            hydration-drivers.test.ts \
            motion-hydration.test.ts \
            ssr-theme.test.ts \
            tooltip-ssr.test.ts \
            tooltip-heavy-ssr.test.ts
        timeout-minutes: 20

      - name: Upload SSR artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v3-ssr-hydration-artifacts
          path: |
            code/sandbox/.playwright-report
            code/sandbox/.playwright-results
          retention-days: 7
          include-hidden-files: true

  v3-bundle-delta:
    if: github.event_name == 'pull_request' && (github.base_ref == 'v3-beta' || startsWith(github.base_ref, 'v3-') || startsWith(github.head_ref, 'v3-'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_OPTIONS: '--max-old-space-size=6144'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install head dependencies
        uses: ./.github/actions/install

      - name: Capture head bundle stats
        run: |
          rm -rf code/kitchen-sink/dist /tmp/tamagui-head-dist
          cd code/kitchen-sink
          NODE_ENV=production bun run prod:web
          cp -R dist /tmp/tamagui-head-dist

      - name: Add base worktree
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git worktree add /tmp/tamagui-base "$BASE_SHA"

      - name: Install base dependencies
        working-directory: /tmp/tamagui-base
        run: bun install --frozen-lockfile

      - name: Capture base bundle stats
        working-directory: /tmp/tamagui-base/code/kitchen-sink
        run: |
          rm -rf dist
          NODE_ENV=production bun run prod:web

      - name: Compare bundle stats
        run: |
          node .github/scripts/compare-webpack-stats.mjs \
            --base /tmp/tamagui-base/code/kitchen-sink/dist/compilation-stats.json \
            --base-dist /tmp/tamagui-base/code/kitchen-sink/dist \
            --head /tmp/tamagui-head-dist/compilation-stats.json \
            --head-dist /tmp/tamagui-head-dist \
            --out /tmp/v3-bundle-delta.md

          mkdir -p bundle-delta-artifacts
          cp /tmp/v3-bundle-delta.md bundle-delta-artifacts/v3-bundle-delta.md
          cp /tmp/tamagui-head-dist/compilation-stats.json bundle-delta-artifacts/head-compilation-stats.json
          cp /tmp/tamagui-base/code/kitchen-sink/dist/compilation-stats.json bundle-delta-artifacts/base-compilation-stats.json
          cat /tmp/v3-bundle-delta.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle delta
        uses: actions/upload-artifact@v4
        with:
          name: v3-bundle-delta
          path: bundle-delta-artifacts
          retention-days: 14
