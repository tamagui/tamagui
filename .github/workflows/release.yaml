name: Release

# testing on a branch for now

on:
  push:
    branches:
      - test-release

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          # Full history needed for git tag and push
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Install
        uses: ./.github/actions/install

      - name: Install playwright
        run: bunx playwright install

      - name: Test
        run: bun run test

      - name: Publish
        # just testing for now so --skip-publish
        run: bun run release:beta:dirty --ci --tamagui-git-user --skip-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  tagged-release:
    name: Tagged Release
    runs-on: ubuntu-latest
    # needs: release
    permissions:
      contents: write

    steps:
      - uses: marvinpinto/action-automatic-releases@d68defdd11f9dcc7f52f35c1b7c236ee7513bcc1 # latest (archived action - consider replacing with softprops/action-gh-release)
        with:
          repo_token: '${{ github.token }}'
          prerelease: false
